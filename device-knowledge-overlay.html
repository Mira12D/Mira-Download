<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .titlebar {
      -webkit-app-region: drag;
      height: 38px;
      background: #0a0c10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 80px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e2130;
    }

    .titlebar-title {
      font-size: 12px;
      font-weight: 600;
      color: #8b8fa8;
      letter-spacing: 0.5px;
    }

    .titlebar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-toggle {
      -webkit-app-region: no-drag;
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 20px;
      padding: 2px 6px;
      display: flex;
      gap: 4px;
      cursor: pointer;
    }
    .lang-option {
      padding: 3px 8px;
      border-radius: 16px;
      font-size: 10px;
      font-weight: 600;
      transition: all 0.15s;
      color: #5a5f78;
    }
    .lang-option.active {
      background: #6c63ff;
      color: white;
    }

    .titlebar-close {
      -webkit-app-region: no-drag;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: #2a2d3a;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .titlebar-close:hover { background: #ff4757; color: white; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 18px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #5a5f78;
      margin-bottom: 6px;
    }

    .app-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .app-chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #2a2d3a;
      background: #161820;
      color: #8b8fa8;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .app-chip:hover { border-color: #6c63ff; color: #a09aff; }
    .app-chip.active { border-color: #6c63ff; background: #1e1a3a; color: #a09aff; font-weight: 600; }

    .text-area-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      background: #161820;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #6c63ff; }
    textarea::placeholder { color: #3a3d50; }

    .char-count {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 10px;
      color: #3a3d50;
    }

    .screenshot-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .btn-screenshot {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
      background: #161820;
      color: #8b8fa8;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn-screenshot:hover { border-color: #4ecdc4; color: #4ecdc4; }
    .btn-screenshot.captured { border-color: #4ecdc4; color: #4ecdc4; background: #0e2420; }

    .screenshot-preview {
      flex: 1;
      height: 60px;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
      background: #161820;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .screenshot-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.7;
    }
    .screenshot-preview .placeholder-text {
      font-size: 10px;
      color: #3a3d50;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .btn-submit:hover { background: linear-gradient(135deg, #7c74ff, #6a62f0); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .loading-bar {
      width: 100%;
      height: 2px;
      background: #1e2130;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .loading-bar.active { display: block; }
    .loading-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #6c63ff, #4ecdc4, #6c63ff);
      background-size: 200% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
      width: 100%;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .result-panel {
      background: #0d1a14;
      border: 1px solid #1a3a28;
      border-radius: 10px;
      padding: 14px;
      display: none;
    }
    .result-panel.visible { display: block; }

    .result-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #34d399;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .learned-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #1a2e20;
    }
    .learned-item:last-child { border-bottom: none; padding-bottom: 0; }

    .learned-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .learned-konzept {
      font-size: 11px;
      font-weight: 600;
      color: #a0f0cc;
      margin-bottom: 2px;
    }
    .learned-desc {
      font-size: 11px;
      color: #5a8a6a;
    }

    .error-panel {
      background: #1a0d0d;
      border: 1px solid #3a1a1a;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: #ff6b6b;
      display: none;
    }
    .error-panel.visible { display: block; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }
  </style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-title" id="titlebar-text">Mira beibringen</span>
  <div class="titlebar-right">
    <!-- Language Toggle -->
    <div class="lang-toggle" onclick="toggleLanguage()">
      <span class="lang-option" id="lang-de" style="background:#6c63ff;color:white">DE</span>
      <span class="lang-option" id="lang-en">EN</span>
    </div>
    <button class="titlebar-close" onclick="closeOverlay()">✕</button>
  </div>
</div>

<div class="content">

  <!-- App auswählen -->
  <div>
    <div class="section-label" id="app-label">App / Kontext</div>
    <div class="app-selector" id="app-chips">
      <div class="app-chip active" data-app="Allgemein" id="app-general">Allgemein</div>
      <div class="app-chip" data-app="Word" id="app-word">Word</div>
      <div class="app-chip" data-app="Excel" id="app-excel">Excel</div>
      <div class="app-chip" data-app="Outlook" id="app-outlook">Outlook</div>
      <div class="app-chip" data-app="Chrome" id="app-chrome">Chrome</div>
      <div class="app-chip" data-app="Finder" id="app-finder">Finder</div>
      <div class="app-chip" data-app="Teams" id="app-teams">Teams</div>
      <div class="app-chip" data-app="Sonstiges" id="app-other">Sonstiges</div>
    </div>
  </div>

  <!-- Freitext -->
  <div>
    <div class="section-label" id="knowledge-label">Was soll Mira wissen?</div>
    <div class="text-area-wrap">
      <textarea id="knowledge-text"
        placeholder="z.B. Der Fett-Button ist in der Home-Toolbar oben links. Neue Seite öffnen: Datei → Neu. Tabelle einfügen: Einfügen → Tabelle. Speichern: Cmd+S."
        oninput="updateCharCount()"
        maxlength="1000"></textarea>
      <span class="char-count" id="char-count">0 / 1000</span>
    </div>
  </div>

  <!-- Screenshot -->
  <div>
    <div class="section-label" id="screenshot-label">Aktueller Bildschirm (optional)</div>
    <div class="screenshot-row">
      <button class="btn-screenshot" id="sc-btn" onclick="captureScreenshot()">
        <span>📸</span> <span id="sc-btn-text">Screenshot hinzufügen</span>
      </button>
      <div class="screenshot-preview" id="sc-preview">
        <span class="placeholder-text" id="sc-placeholder">Kein Screenshot</span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-bar" id="loading-bar">
    <div class="loading-bar-inner"></div>
  </div>

  <!-- Submit -->
  <button class="btn-submit" id="submit-btn" onclick="submitKnowledge()">
    <span id="submit-text">Mira beibringen</span> ✦
  </button>

  <!-- Ergebnis -->
  <div class="result-panel" id="result-panel">
    <div class="result-header" id="result-header">✦ Mira hat gelernt</div>
    <div id="learned-list"></div>
  </div>

  <!-- Fehler -->
  <div class="error-panel" id="error-panel"></div>

</div>

<script>
  const { ipcRenderer } = require('electron');

  // ====================================
  // INTERNATIONALIZATION (DE/EN)
  // ====================================
  
  const i18n = {
    de: {
      'titlebar-text': 'Mira beibringen',
      'app-label': 'App / Kontext',
      'app-general': 'Allgemein',
      'app-word': 'Word',
      'app-excel': 'Excel',
      'app-outlook': 'Outlook',
      'app-chrome': 'Chrome',
      'app-finder': 'Finder',
      'app-teams': 'Teams',
      'app-other': 'Sonstiges',
      'knowledge-label': 'Was soll Mira wissen?',
      'knowledge-placeholder': 'z.B. Der Fett-Button ist in der Home-Toolbar oben links. Neue Seite öffnen: Datei → Neu. Tabelle einfügen: Einfügen → Tabelle. Speichern: Cmd+S.',
      'screenshot-label': 'Aktueller Bildschirm (optional)',
      'sc-btn-text': 'Screenshot hinzufügen',
      'sc-capturing': 'Wird aufgenommen...',
      'sc-captured': 'Screenshot gespeichert',
      'sc-placeholder': 'Kein Screenshot',
      'submit-text': 'Mira beibringen',
      'submit-loading': 'Mira lernt...',
      'result-header': '✦ Mira hat gelernt',
      'error-required': 'Bitte beschreibe was Mira lernen soll.',
      'error-unknown': 'Unbekannter Fehler',
      'error-connection': 'Verbindungsfehler: ',
      'learned-general': 'Allgemein',
      'learned-saved': 'Wissen gespeichert',
    },
    en: {
      'titlebar-text': 'Teach Mira',
      'app-label': 'App / Context',
      'app-general': 'General',
      'app-word': 'Word',
      'app-excel': 'Excel',
      'app-outlook': 'Outlook',
      'app-chrome': 'Chrome',
      'app-finder': 'Finder',
      'app-teams': 'Teams',
      'app-other': 'Other',
      'knowledge-label': 'What should Mira know?',
      'knowledge-placeholder': 'e.g. The bold button is in the Home toolbar top left. New page: File → New. Insert table: Insert → Table. Save: Cmd+S.',
      'screenshot-label': 'Current screen (optional)',
      'sc-btn-text': 'Add screenshot',
      'sc-capturing': 'Capturing...',
      'sc-captured': 'Screenshot saved',
      'sc-placeholder': 'No screenshot',
      'submit-text': 'Teach Mira',
      'submit-loading': 'Mira is learning...',
      'result-header': '✦ Mira learned',
      'error-required': 'Please describe what Mira should learn.',
      'error-unknown': 'Unknown error',
      'error-connection': 'Connection error: ',
      'learned-general': 'General',
      'learned-saved': 'Knowledge saved',
    }
  };

  let currentLang = localStorage.getItem('mira_language') || 'de';
  let selectedApp = 'Allgemein';
  let capturedScreenshot = null;
  let capturedAX = null;

  function toggleLanguage() {
    currentLang = currentLang === 'de' ? 'en' : 'de';
    localStorage.setItem('mira_language', currentLang);
    updateUILanguage();
  }

  function updateUILanguage() {
    // Update toggle buttons
    document.querySelectorAll('.lang-option').forEach(el => {
      if (el.id === 'lang-de') {
        el.style.background = currentLang === 'de' ? '#6c63ff' : 'transparent';
        el.style.color = currentLang === 'de' ? 'white' : '#5a5f78';
      }
      if (el.id === 'lang-en') {
        el.style.background = currentLang === 'en' ? '#6c63ff' : 'transparent';
        el.style.color = currentLang === 'en' ? 'white' : '#5a5f78';
      }
    });

    // Update all text elements
    const elements = [
      'titlebar-text', 'app-label', 'knowledge-label', 'screenshot-label',
      'sc-btn-text', 'sc-placeholder', 'submit-text', 'result-header',
      'app-general', 'app-word', 'app-excel', 'app-outlook', 'app-chrome',
      'app-finder', 'app-teams', 'app-other'
    ];

    elements.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = i18n[currentLang][id];
    });

    // Update placeholder
    const textarea = document.getElementById('knowledge-text');
    if (textarea) textarea.placeholder = i18n[currentLang]['knowledge-placeholder'];

    // Update app chips text (they have their own IDs now)
    document.querySelectorAll('.app-chip').forEach(chip => {
      const appId = chip.id;
      if (appId && i18n[currentLang][appId]) {
        chip.textContent = i18n[currentLang][appId];
      }
    });

    // Update button states if needed
    const scBtn = document.getElementById('sc-btn');
    if (scBtn && scBtn.classList.contains('captured')) {
      document.getElementById('sc-btn-text').textContent = i18n[currentLang]['sc-captured'];
    }
  }

  // App-Chip Auswahl
  document.getElementById('app-chips').addEventListener('click', (e) => {
    const chip = e.target.closest('.app-chip');
    if (!chip) return;
    document.querySelectorAll('.app-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedApp = chip.dataset.app;
  });

  function updateCharCount() {
    const len = document.getElementById('knowledge-text').value.length;
    document.getElementById('char-count').textContent = `${len} / 1000`;
  }

  async function captureScreenshot() {
    const btn = document.getElementById('sc-btn');
    const btnText = document.getElementById('sc-btn-text');
    btn.disabled = true;
    btnText.textContent = i18n[currentLang]['sc-capturing'];
    try {
      const result = await ipcRenderer.invoke('device-knowledge-screenshot');
      capturedScreenshot = result.screenshot;
      capturedAX = result.ax_state;
      btn.classList.add('captured');
      btnText.textContent = i18n[currentLang]['sc-captured'];
      const preview = document.getElementById('sc-preview');
      preview.innerHTML = `<img src="data:image/jpeg;base64,${capturedScreenshot}" alt="screenshot">`;
    } catch(e) {
      btnText.textContent = i18n[currentLang]['sc-btn-text'];
    }
    btn.disabled = false;
  }

  async function submitKnowledge() {
    const text = document.getElementById('knowledge-text').value.trim();
    if (!text) {
      showError(i18n[currentLang]['error-required']);
      return;
    }

    const btn = document.getElementById('submit-btn');
    const submitText = document.getElementById('submit-text');
    btn.disabled = true;
    submitText.textContent = i18n[currentLang]['submit-loading'];
    document.getElementById('loading-bar').classList.add('active');
    document.getElementById('result-panel').classList.remove('visible');
    document.getElementById('error-panel').classList.remove('visible');

    try {
      const result = await ipcRenderer.invoke('device-knowledge-save', {
        app_name: selectedApp,
        text,
        screenshot: capturedScreenshot,
        ax_state: capturedAX
      });

      if (result.success && result.learned?.length > 0) {
        showResult(result.learned);
        document.getElementById('knowledge-text').value = '';
        updateCharCount();
        capturedScreenshot = null;
        capturedAX = null;
        const scBtn = document.getElementById('sc-btn');
        const scBtnText = document.getElementById('sc-btn-text');
        scBtn.classList.remove('captured');
        scBtnText.textContent = i18n[currentLang]['sc-btn-text'];
        document.getElementById('sc-preview').innerHTML = `<span class="placeholder-text" id="sc-placeholder">${i18n[currentLang]['sc-placeholder']}</span>`;
      } else if (result.success) {
        showResult([{ konzept: i18n[currentLang]['learned-general'], beschreibung: i18n[currentLang]['learned-saved'] }]);
      } else {
        showError(result.error || i18n[currentLang]['error-unknown']);
      }
    } catch(e) {
      showError(i18n[currentLang]['error-connection'] + e.message);
    }

    document.getElementById('loading-bar').classList.remove('active');
    btn.disabled = false;
    submitText.textContent = i18n[currentLang]['submit-text'];
  }

  function showResult(learned) {
    const list = document.getElementById('learned-list');
    list.innerHTML = learned.map(item => `
      <div class="learned-item">
        <div class="learned-dot"></div>
        <div>
          <div class="learned-konzept">${item.konzept} ${item.methode ? '· ' + item.methode : ''}</div>
          <div class="learned-desc">${item.beschreibung || ''}</div>
        </div>
      </div>
    `).join('');
    document.getElementById('result-panel').classList.add('visible');
  }

  function showError(msg) {
    const p = document.getElementById('error-panel');
    p.textContent = '⚠ ' + msg;
    p.classList.add('visible');
  }

  function closeOverlay() {
    ipcRenderer.invoke('device-knowledge-close');
  }

  // Initialize language
  updateUILanguage();
</script>

</body>
</html>
