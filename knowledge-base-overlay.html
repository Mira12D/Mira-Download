<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRA Wissensbase</title>
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #22263a;
    --border:   #2e3248;
    --border2:  #3a3f5c;
    --text:     #e2e8f0;
    --text2:    #8892a4;
    --accent:   #6c63ff;
    --green:    #34d399;
    --red:      #f87171;
    --yellow:   #fbbf24;
    --radius:   10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-app-region: drag;
  }
  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-icon { font-size: 20px; }
  .header-title { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
  .header-sub   { font-size: 11px; color: var(--text2); }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-app-region: no-drag;
  }
  .lang-toggle {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2px 6px;
    display: flex;
    gap: 4px;
    cursor: pointer;
  }
  .lang-option {
    padding: 3px 8px;
    border-radius: 16px;
    font-size: 10px;
    font-weight: 600;
    transition: all 0.15s;
    color: var(--text2);
  }
  .lang-option.active {
    background: var(--accent);
    color: white;
  }
  .header-close {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    -webkit-app-region: no-drag;
  }
  .header-close:hover { background: var(--surface2); color: var(--text); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 10px 20px 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  .tab {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    background: none;
    transition: background .15s, color .15s;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active {
    color: var(--text);
    background: var(--bg);
    border-color: var(--border);
    border-bottom-color: var(--bg);
    margin-bottom: -1px;
    z-index: 1;
  }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    -webkit-app-region: no-drag;
  }
  .pane { display: none; }
  .pane.active { display: block; }

  /* ── Form elements ── */
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 64px; }
  .form-row { margin-bottom: 14px; }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-grid3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  /* ── Cards (list items) ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-title { font-size: 13px; font-weight: 600; flex: 1; }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .badge-chef      { background: rgba(108,99,255,.25); color: #a29bfe; }
  .badge-lieferant { background: rgba(251,191,36,.2);  color: #fbbf24; }
  .badge-kunde     { background: rgba(52,211,153,.2);  color: #34d399; }
  .badge-sonstige  { background: rgba(148,163,184,.15); color: #94a3b8; }
  .badge-auto      { background: rgba(52,211,153,.2);  color: #34d399; }
  .badge-manual    { background: rgba(248,113,113,.2); color: #f87171; }

  .card-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    padding: 4px 8px;
    transition: background .15s, color .15s;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); }
  .btn-icon.del:hover { border-color: var(--red); color: var(--red); }

  /* ── Add button ── */
  .btn-add {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
    background: none;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
    margin-top: 4px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Footer ── */
  .footer {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); }
  .status { font-size: 12px; color: var(--text2); margin-left: auto; }
  .status.ok  { color: var(--green); }
  .status.err { color: var(--red); }

  /* ── Modal / inline edit ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    width: 420px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  .section-title {
    font-size: 11px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: .8px;
    margin-bottom: 12px;
  }

  .empty-state { text-align: center; color: var(--text2); font-size: 13px; padding: 30px 0; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-icon">🧠</div>
  <div>
    <div class="header-title" id="header-title">MIRA Wissensbase</div>
    <div class="header-sub" id="header-sub">MIRAs konfigurierbares Gehirn</div>
  </div>
  <div class="header-right">
    <!-- Language Toggle -->
    <div class="lang-toggle" onclick="toggleLanguage()">
      <span class="lang-option" id="lang-de" style="background:#6c63ff;color:white">DE</span>
      <span class="lang-option" id="lang-en">EN</span>
    </div>
    <button class="header-close" onclick="closeWindow()">✕</button>
  </div>
</div>

<!-- ── Tabs ── -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('kontext')" id="tab-context">⚙ Kontext</button>
  <button class="tab"        onclick="switchTab('trigger')" id="tab-trigger">⚡ Trigger</button>
  <button class="tab"        onclick="switchTab('kontakte')" id="tab-contacts">👥 Kontakte</button>
  <button class="tab"        onclick="switchTab('grenzen')" id="tab-limits">🛡 Grenzen</button>
</div>

<!-- ── Content ── -->
<div class="content">

  <!-- KONTEXT -->
  <div id="pane-kontext" class="pane active">
    <div class="section-title" id="context-title">Unternehmen & Rolle</div>
    <div class="form-grid">
      <div class="form-row">
        <label id="label-company">Unternehmensname</label>
        <input id="ctx-company" type="text" placeholder="z. B. Müller GmbH">
      </div>
      <div class="form-row">
        <label id="label-role">MIRAs Rolle</label>
        <input id="ctx-role" type="text" placeholder="z. B. Buchhaltungsassistentin">
      </div>
    </div>
    <div class="form-row">
      <label id="label-language">Sprache</label>
      <select id="ctx-lang">
        <option value="de">Deutsch</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
      </select>
    </div>
    <div class="form-row">
      <label id="label-notes">Zusätzliche Hinweise für MIRA</label>
      <textarea id="ctx-notes" rows="4" placeholder="z. B. Rechnungen immer in EUR. Lieferanten per E-Mail bestätigen. Keine Zahlungen über 5.000 € ohne Rückfrage."></textarea>
    </div>
  </div>

  <!-- TRIGGER -->
  <div id="pane-trigger" class="pane">
    <div class="section-title" id="trigger-title">Events → Routen</div>
    <div id="trigger-list"></div>
    <button class="btn-add" onclick="openTriggerModal()" id="trigger-add">+ Trigger hinzufügen</button>
  </div>

  <!-- KONTAKTE -->
  <div id="pane-kontakte" class="pane">
    <div class="section-title" id="contacts-title">Personen & Unternehmen</div>
    <div id="contact-list"></div>
    <button class="btn-add" onclick="openContactModal()" id="contact-add">+ Kontakt hinzufügen</button>
  </div>

  <!-- GRENZEN -->
  <div id="pane-grenzen" class="pane">
    <div class="section-title" id="limits-title">Autonomiegrenzen</div>
    <div id="limit-list"></div>
    <button class="btn-add" onclick="openLimitModal()" id="limit-add">+ Grenze hinzufügen</button>
  </div>

</div>

<!-- ── Footer ── -->
<div class="footer">
  <button class="btn btn-secondary" onclick="loadKB()" id="btn-reload">↺ Neu laden</button>
  <button class="btn btn-primary"   onclick="saveKB()" id="btn-save">💾 Speichern</button>
  <span id="status-msg" class="status"></span>
</div>

<!-- ══════════════════════════════════════════════ -->
<!-- MODALS                                         -->
<!-- ══════════════════════════════════════════════ -->

<!-- Trigger Modal -->
<div id="modal-trigger" class="modal-backdrop">
  <div class="modal">
    <div class="modal-title" id="trigger-modal-title">Trigger hinzufügen</div>
    <input type="hidden" id="trigger-edit-idx" value="">
    <div class="form-row">
      <label id="trigger-event-label">Event-Typ</label>
      <select id="t-event">
        <option value="new_mail" id="event-new-mail">Neue E-Mail</option>
        <option value="new_invoice" id="event-new-invoice">Neue Rechnung</option>
        <option value="new_order" id="event-new-order">Neue Bestellung</option>
        <option value="schedule" id="event-schedule">Zeitplan (täglich/wöchentlich)</option>
        <option value="file_created" id="event-file">Neue Datei</option>
        <option value="custom" id="event-custom">Benutzerdefiniert</option>
      </select>
    </div>
    <div class="form-row">
      <label id="trigger-condition-label">Bedingung (Komma-getrennte Stichwörter, optional)</label>
      <input id="t-condition" type="text" placeholder="z. B. rechnung, invoice, zahlung">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label id="trigger-route-id-label">Route-ID</label>
        <input id="t-route-id" type="text" placeholder="route_abc123">
      </div>
      <div class="form-row">
        <label id="trigger-route-name-label">Route-Name (Anzeige)</label>
        <input id="t-route-name" type="text" placeholder="z. B. Rechnung buchen">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label id="trigger-priority-label">Priorität (1 = höchste)</label>
        <input id="t-priority" type="number" min="1" max="99" value="10">
      </div>
      <div class="form-row">
        <label id="trigger-auto-label">Ausführung</label>
        <select id="t-auto">
          <option value="true" id="auto-autonomous">Autonom</option>
          <option value="false" id="auto-ask">Erst fragen</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModals()" id="modal-cancel">Abbrechen</button>
      <button class="btn btn-primary"   onclick="saveTrigger()" id="modal-save">Speichern</button>
    </div>
  </div>
</div>

<!-- Contact Modal -->
<div id="modal-contact" class="modal-backdrop">
  <div class="modal">
    <div class="modal-title" id="contact-modal-title">Kontakt hinzufügen</div>
    <input type="hidden" id="contact-edit-idx" value="">
    <div class="form-grid">
      <div class="form-row">
        <label id="contact-name-label">Name</label>
        <input id="c-name" type="text" placeholder="Max Mustermann">
      </div>
      <div class="form-row">
        <label id="contact-role-label">Rolle</label>
        <select id="c-role">
          <option value="chef" id="role-boss">Chef / Vorgesetzter</option>
          <option value="lieferant" id="role-supplier">Lieferant</option>
          <option value="kunde" id="role-customer">Kunde</option>
          <option value="kollege" id="role-colleague">Kollege</option>
          <option value="sonstige" id="role-other">Sonstige</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label id="contact-email-label">E-Mail</label>
        <input id="c-email" type="email" placeholder="max@firma.de">
      </div>
      <div class="form-row">
        <label id="contact-phone-label">Telefon (optional)</label>
        <input id="c-phone" type="text" placeholder="+49 ...">
      </div>
    </div>
    <div class="form-row">
      <label id="contact-notes-label">Notizen</label>
      <textarea id="c-notes" rows="2" placeholder="z. B. Zahlung immer bis Ende des Monats"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModals()" id="modal-cancel2">Abbrechen</button>
      <button class="btn btn-primary"   onclick="saveContact()" id="modal-save2">Speichern</button>
    </div>
  </div>
</div>

<!-- Limit Modal -->
<div id="modal-limit" class="modal-backdrop">
  <div class="modal">
    <div class="modal-title" id="limit-modal-title">Grenze hinzufügen</div>
    <input type="hidden" id="limit-edit-idx" value="">
    <div class="form-row">
      <label id="limit-action-label">Aktion</label>
      <input id="l-action" type="text" placeholder="z. B. send_mail, approve_invoice, delete_file">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label id="limit-auto-label">Ausführung</label>
        <select id="l-auto">
          <option value="true" id="limit-autonomous">Autonom</option>
          <option value="false" id="limit-escalate">Eskalieren</option>
        </select>
      </div>
      <div class="form-row">
        <label id="limit-threshold-label">Grenzwert (optional, €)</label>
        <input id="l-threshold" type="number" placeholder="z. B. 500">
      </div>
    </div>
    <div class="form-row">
      <label id="limit-escalate-label">Eskalieren an (E-Mail oder Name)</label>
      <input id="l-escalate" type="text" placeholder="chef@firma.de">
    </div>
    <div class="form-row">
      <label id="limit-notes-label">Notizen</label>
      <textarea id="l-notes" rows="2" placeholder="z. B. Rechnungen über 500 € immer bestätigen lassen"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModals()" id="modal-cancel3">Abbrechen</button>
      <button class="btn btn-primary"   onclick="saveLimit()" id="modal-save3">Speichern</button>
    </div>
  </div>
</div>

let currentLang = localStorage.getItem('mira_language') || 'de';

function toggleLanguage() {
  currentLang = currentLang === 'de' ? 'en' : 'de';
  localStorage.setItem('mira_language', currentLang);
  updateUILanguage();
  renderAll(); // Re-render all dynamic content
}

function updateUILanguage() {
  // Update toggle buttons
  document.querySelectorAll('.lang-option').forEach(el => {
    if (el.id === 'lang-de') {
      el.style.background = currentLang === 'de' ? '#6c63ff' : 'transparent';
      el.style.color = currentLang === 'de' ? 'white' : 'var(--text2)';
    }
    if (el.id === 'lang-en') {
      el.style.background = currentLang === 'en' ? '#6c63ff' : 'transparent';
      el.style.color = currentLang === 'en' ? 'white' : 'var(--text2)';
    }
  });

  // Update all static elements with IDs
  const elements = [
    'header-title', 'header-sub', 'tab-context', 'tab-trigger', 'tab-contacts', 'tab-limits',
    'context-title', 'label-company', 'label-role', 'label-language', 'label-notes',
    'trigger-title', 'trigger-add', 'contacts-title', 'contact-add', 'limits-title', 'limit-add',
    'btn-reload', 'btn-save', 'trigger-modal-title', 'contact-modal-title', 'limit-modal-title',
    'trigger-event-label', 'trigger-condition-label', 'trigger-route-id-label', 'trigger-route-name-label',
    'trigger-priority-label', 'trigger-auto-label', 'contact-name-label', 'contact-role-label',
    'contact-email-label', 'contact-phone-label', 'contact-notes-label', 'limit-action-label',
    'limit-auto-label', 'limit-threshold-label', 'limit-escalate-label', 'limit-notes-label',
    'modal-cancel', 'modal-save', 'modal-cancel2', 'modal-save2', 'modal-cancel3', 'modal-save3'
  ];

  elements.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = i18n[currentLang][id];
  });

  // Update placeholders
  document.getElementById('ctx-company').placeholder = i18n[currentLang]['company-placeholder'];
  document.getElementById('ctx-role').placeholder = i18n[currentLang]['role-placeholder'];
  document.getElementById('ctx-notes').placeholder = i18n[currentLang]['notes-placeholder'];
  document.getElementById('t-condition').placeholder = i18n[currentLang]['condition-placeholder'];
  document.getElementById('t-route-id').placeholder = i18n[currentLang]['route-id-placeholder'];
  document.getElementById('t-route-name').placeholder = i18n[currentLang]['route-name-placeholder'];
  document.getElementById('c-name').placeholder = i18n[currentLang]['name-placeholder'];
  document.getElementById('c-email').placeholder = i18n[currentLang]['email-placeholder'];
  document.getElementById('c-phone').placeholder = i18n[currentLang]['phone-placeholder'];
  document.getElementById('c-notes').placeholder = i18n[currentLang]['notes-contact-placeholder'];
  document.getElementById('l-action').placeholder = i18n[currentLang]['action-placeholder'];
  document.getElementById('l-threshold').placeholder = i18n[currentLang]['threshold-placeholder'];
  document.getElementById('l-escalate').placeholder = i18n[currentLang]['escalate-placeholder'];
  document.getElementById('l-notes').placeholder = i18n[currentLang]['notes-limit-placeholder'];

  // Update select options
  const eventOptions = ['new_mail', 'new_invoice', 'new_order', 'schedule', 'file_created', 'custom'];
  eventOptions.forEach(opt => {
    const el = document.getElementById(`event-${opt}`);
    if (el) el.textContent = i18n[currentLang][`event-${opt}`];
  });

  const roleOptions = ['boss', 'supplier', 'customer', 'colleague', 'other'];
  roleOptions.forEach(opt => {
    const el = document.getElementById(`role-${opt}`);
    if (el) el.textContent = i18n[currentLang][`role-${opt}`];
  });

  // Update auto options
  document.getElementById('auto-autonomous').textContent = i18n[currentLang]['auto-autonomous'];
  document.getElementById('auto-ask').textContent = i18n[currentLang]['auto-ask'];
  document.getElementById('limit-autonomous').textContent = i18n[currentLang]['limit-autonomous'];
  document.getElementById('limit-escalate').textContent = i18n[currentLang]['limit-escalate'];
}

// ── State ──────────────────────────────────────────────────────────────────

let kb = {
  context:  { company_name: '', role: '', language: 'de', notes: '' },
  triggers: [],
  contacts: [],
  limits:   [],
};

// ── Init ───────────────────────────────────────────────────────────────────

async function init() {
  updateUILanguage();
  await loadKB();
}

// ── IPC ────────────────────────────────────────────────────────────────────

async function loadKB() {
  setStatus(i18n[currentLang]['status-loading'], '');
  try {
    const result = await ipcRenderer.invoke('kb-load');
    if (result.success) {
      kb = result.kb || kb;
      renderAll();
      setStatus(i18n[currentLang]['status-loaded'], 'ok');
    } else {
      setStatus(i18n[currentLang]['status-error'] + (result.error || '?'), 'err');
    }
  } catch (e) {
    setStatus(i18n[currentLang]['status-connection-error'], 'err');
  }
}

async function saveKB() {
  collectContext();
  setStatus(i18n[currentLang]['status-saving'], '');
  try {
    const result = await ipcRenderer.invoke('kb-save', kb);
    if (result.success) {
      setStatus(i18n[currentLang]['status-saved'], 'ok');
    } else {
      setStatus(i18n[currentLang]['status-error'] + (result.error || '?'), 'err');
    }
  } catch (e) {
    setStatus(i18n[currentLang]['status-error'] + e.message, 'err');
  }
}

function closeWindow() {
  ipcRenderer.invoke('kb-close');
}

// ── Tabs ───────────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
}

// ── Render ─────────────────────────────────────────────────────────────────

function renderAll() {
  // Kontext
  document.getElementById('ctx-company').value = kb.context?.company_name || '';
  document.getElementById('ctx-role').value    = kb.context?.role         || '';
  document.getElementById('ctx-lang').value    = kb.context?.language     || 'de';
  document.getElementById('ctx-notes').value   = kb.context?.notes        || '';

  renderTriggers();
  renderContacts();
  renderLimits();
}

function collectContext() {
  kb.context = {
    company_name: document.getElementById('ctx-company').value.trim(),
    role:         document.getElementById('ctx-role').value.trim(),
    language:     document.getElementById('ctx-lang').value,
    notes:        document.getElementById('ctx-notes').value.trim(),
  };
}

function renderTriggers() {
  const el = document.getElementById('trigger-list');
  if (!kb.triggers.length) {
    el.innerHTML = `<div class="empty-state">${i18n[currentLang]['empty-triggers']}</div>`;
    return;
  }
  el.innerHTML = kb.triggers.map((t, i) => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${escHtml(t.route_name || t.route_id || '—')}</div>
        <span class="badge ${t.auto !== false ? 'badge-auto' : 'badge-manual'}">${t.auto !== false ? i18n[currentLang]['badge-autonomous'] : i18n[currentLang]['badge-ask']}</span>
        <div class="card-actions">
          <button class="btn-icon" onclick="editTrigger(${i})">✎</button>
          <button class="btn-icon del" onclick="deleteTrigger(${i})">✕</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text2)">
        <b>${i18n[currentLang]['trigger-event-label'].replace(':', '')}:</b> ${escHtml(eventLabel(t.event))}
        ${t.condition ? `&nbsp;·&nbsp;<b>${i18n[currentLang]['trigger-condition-label'].replace(':', '')}:</b> ${escHtml(t.condition)}` : ''}
        &nbsp;·&nbsp;<b>${i18n[currentLang]['trigger-route-id-label'].replace(':', '')}:</b> <code style="font-size:11px">${escHtml(t.route_id || '—')}</code>
        &nbsp;·&nbsp;<b>${i18n[currentLang]['trigger-priority-label'].replace(':', '')}:</b> ${t.priority ?? 10}
      </div>
    </div>
  `).join('');
}

function renderContacts() {
  const el = document.getElementById('contact-list');
  if (!kb.contacts.length) {
    el.innerHTML = `<div class="empty-state">${i18n[currentLang]['empty-contacts']}</div>`;
    return;
  }
  el.innerHTML = kb.contacts.map((c, i) => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${escHtml(c.name || '—')}</div>
        <span class="badge badge-${c.role || 'sonstige'}">${escHtml(roleLabel(c.role))}</span>
        <div class="card-actions">
          <button class="btn-icon" onclick="editContact(${i})">✎</button>
          <button class="btn-icon del" onclick="deleteContact(${i})">✕</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text2)">
        ${c.email ? escHtml(c.email) : ''}${c.phone ? ' · ' + escHtml(c.phone) : ''}
        ${c.notes ? '<br>' + escHtml(c.notes) : ''}
      </div>
    </div>
  `).join('');
}

function renderLimits() {
  const el = document.getElementById('limit-list');
  if (!kb.limits.length) {
    el.innerHTML = `<div class="empty-state">${i18n[currentLang]['empty-limits']}</div>`;
    return;
  }
  el.innerHTML = kb.limits.map((l, i) => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${escHtml(l.action || '—')}</div>
        <span class="badge ${l.autonomous !== false ? 'badge-auto' : 'badge-manual'}">${l.autonomous !== false ? i18n[currentLang]['badge-autonomous'] : i18n[currentLang]['badge-escalate']}</span>
        <div class="card-actions">
          <button class="btn-icon" onclick="editLimit(${i})">✎</button>
          <button class="btn-icon del" onclick="deleteLimit(${i})">✕</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text2)">
        ${l.threshold ? `${i18n[currentLang]['limit-threshold-label'].replace(':', '')} <b>${escHtml(String(l.threshold))} €</b>&nbsp;·&nbsp;` : ''}
        ${l.escalate_to ? `${i18n[currentLang]['limit-escalate-label'].replace(':', '')} ${escHtml(l.escalate_to)}&nbsp;·&nbsp;` : ''}
        ${l.notes ? escHtml(l.notes) : ''}
      </div>
    </div>
  `).join('');
}

// ── Trigger CRUD ───────────────────────────────────────────────────────────

function openTriggerModal(idx) {
  const editing = idx !== undefined;
  document.getElementById('trigger-modal-title').textContent = editing ? 
    (currentLang === 'de' ? 'Trigger bearbeiten' : 'Edit trigger') : 
    i18n[currentLang]['trigger-modal-title'];
  document.getElementById('trigger-edit-idx').value = editing ? String(idx) : '';
  const t = editing ? kb.triggers[idx] : {};
  document.getElementById('t-event').value      = t.event      || 'new_mail';
  document.getElementById('t-condition').value  = t.condition  || '';
  document.getElementById('t-route-id').value   = t.route_id   || '';
  document.getElementById('t-route-name').value = t.route_name || '';
  document.getElementById('t-priority').value   = t.priority   ?? 10;
  document.getElementById('t-auto').value        = String(t.auto !== false);
  document.getElementById('modal-trigger').classList.add('open');
}

function editTrigger(idx)   { openTriggerModal(idx); }
function deleteTrigger(idx) { kb.triggers.splice(idx, 1); renderTriggers(); }

function saveTrigger() {
  const idxStr = document.getElementById('trigger-edit-idx').value;
  const t = {
    id:         idxStr ? kb.triggers[+idxStr]?.id : uid(),
    event:      document.getElementById('t-event').value,
    condition:  document.getElementById('t-condition').value.trim(),
    route_id:   document.getElementById('t-route-id').value.trim(),
    route_name: document.getElementById('t-route-name').value.trim(),
    priority:   parseInt(document.getElementById('t-priority').value) || 10,
    auto:       document.getElementById('t-auto').value === 'true',
  };
  if (!t.route_id) return alert(i18n[currentLang]['alert-route-id']);
  if (idxStr !== '') kb.triggers[+idxStr] = t;
  else kb.triggers.push(t);
  closeModals();
  renderTriggers();
}

// ── Contact CRUD ───────────────────────────────────────────────────────────

function openContactModal(idx) {
  const editing = idx !== undefined;
  document.getElementById('contact-modal-title').textContent = editing ? 
    (currentLang === 'de' ? 'Kontakt bearbeiten' : 'Edit contact') : 
    i18n[currentLang]['contact-modal-title'];
  document.getElementById('contact-edit-idx').value = editing ? String(idx) : '';
  const c = editing ? kb.contacts[idx] : {};
  document.getElementById('c-name').value  = c.name  || '';
  document.getElementById('c-role').value  = c.role  || 'sonstige';
  document.getElementById('c-email').value = c.email || '';
  document.getElementById('c-phone').value = c.phone || '';
  document.getElementById('c-notes').value = c.notes || '';
  document.getElementById('modal-contact').classList.add('open');
}

function editContact(idx)   { openContactModal(idx); }
function deleteContact(idx) { kb.contacts.splice(idx, 1); renderContacts(); }

function saveContact() {
  const idxStr = document.getElementById('contact-edit-idx').value;
  const c = {
    id:    idxStr ? kb.contacts[+idxStr]?.id : uid(),
    name:  document.getElementById('c-name').value.trim(),
    role:  document.getElementById('c-role').value,
    email: document.getElementById('c-email').value.trim(),
    phone: document.getElementById('c-phone').value.trim(),
    notes: document.getElementById('c-notes').value.trim(),
  };
  if (!c.name) return alert(i18n[currentLang]['alert-name']);
  if (idxStr !== '') kb.contacts[+idxStr] = c;
  else kb.contacts.push(c);
  closeModals();
  renderContacts();
}

// ── Limit CRUD ─────────────────────────────────────────────────────────────

function openLimitModal(idx) {
  const editing = idx !== undefined;
  document.getElementById('limit-modal-title').textContent = editing ? 
    (currentLang === 'de' ? 'Grenze bearbeiten' : 'Edit limit') : 
    i18n[currentLang]['limit-modal-title'];
  document.getElementById('limit-edit-idx').value = editing ? String(idx) : '';
  const l = editing ? kb.limits[idx] : {};
  document.getElementById('l-action').value    = l.action    || '';
  document.getElementById('l-auto').value      = String(l.autonomous !== false);
  document.getElementById('l-threshold').value = l.threshold || '';
  document.getElementById('l-escalate').value  = l.escalate_to || '';
  document.getElementById('l-notes').value     = l.notes || '';
  document.getElementById('modal-limit').classList.add('open');
}

function editLimit(idx)   { openLimitModal(idx); }
function deleteLimit(idx) { kb.limits.splice(idx, 1); renderLimits(); }

function saveLimit() {
  const idxStr = document.getElementById('limit-edit-idx').value;
  const l = {
    id:          idxStr ? kb.limits[+idxStr]?.id : uid(),
    action:      document.getElementById('l-action').value.trim(),
    autonomous:  document.getElementById('l-auto').value === 'true',
    threshold:   document.getElementById('l-threshold').value.trim() || null,
    escalate_to: document.getElementById('l-escalate').value.trim(),
    notes:       document.getElementById('l-notes').value.trim(),
  };
  if (!l.action) return alert(i18n[currentLang]['alert-action']);
  if (idxStr !== '') kb.limits[+idxStr] = l;
  else kb.limits.push(l);
  closeModals();
  renderLimits();
}

// ── Helpers ────────────────────────────────────────────────────────────────

function closeModals() {
  document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('open'));
}

// Close modal on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModals(); });
});

function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status ' + (type || '');
  if (type === 'ok') setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function eventLabel(e) {
  return i18n[currentLang][`event-${e}`] || e;
}

function roleLabel(r) {
  const map = {
    chef: 'badge-boss',
    lieferant: 'badge-supplier',
    kunde: 'badge-customer',
    kollege: 'badge-colleague',
    sonstige: 'badge-other'
  };
  return i18n[currentLang][map[r] || 'badge-other'] || r || i18n[currentLang]['badge-other'];
}

// ── Boot ───────────────────────────────────────────────────────────────────
init();
