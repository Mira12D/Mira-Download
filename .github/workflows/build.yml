name: Build MIRA Agent

on:
  push:
    branches:
      - main          # Trigger: jeder Push auf main
  workflow_dispatch:  # Manuell triggern möglich

jobs:

  # ─────────────────────────────────────────
  # WINDOWS: C# Binary + NSIS Installer
  # ─────────────────────────────────────────
  build-windows:
    name: Windows Installer (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build ax-helper-win.exe
        run: |
          cd ax-helper-win
          dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o ../resources
        shell: bash

      - name: Setup Python 3.11 (für node-gyp / distutils)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install setuptools (distutils fix)
        run: pip install setuptools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (postinstall überspringen)
        run: npm ci --ignore-scripts
        env:
          NUT_TREE_TOKEN: ${{ secrets.NUT_TREE_TOKEN }}

      - name: Remove canvas (optionale pdfjs-dep, braucht GTK zum Bauen)
        run: if (Test-Path node_modules\canvas) { Remove-Item -Recurse -Force node_modules\canvas }
        shell: pwsh

      - name: Rebuild sharp für Electron
        run: npx electron-rebuild -f -w sharp

      - name: Build Windows NSIS Installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: MIRA-Agent-Windows
          path: |
            dist/*.exe
            dist/latest.yml
          retention-days: 7

  # ─────────────────────────────────────────
  # MAC arm64: Swift Binary + DMG (Apple Silicon)
  # ─────────────────────────────────────────
  build-mac-arm64:
    name: Mac DMG (Apple Silicon arm64)
    runs-on: macos-latest   # arm64 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ax-helper (Swift arm64)
        run: |
          swiftc ax-helper.swift -O -o resources/ax-helper
          chmod +x resources/ax-helper

      - name: Setup Python 3.11 (für node-gyp / distutils)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install setuptools (distutils fix)
        run: pip install setuptools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NUT_TREE_TOKEN: ${{ secrets.NUT_TREE_TOKEN }}

      - name: Build Mac DMG (arm64)
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac DMG (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: MIRA-Agent-Mac-arm64
          path: |
            dist/*-arm64.dmg
            dist/latest-mac.yml
          retention-days: 7

  # ─────────────────────────────────────────
  # MAC x64: Swift Binary + DMG (Intel)
  # ─────────────────────────────────────────
  build-mac-x64:
    name: Mac DMG (Intel x64)
    runs-on: macos-13       # Intel x64 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ax-helper (Swift x64)
        run: |
          swiftc ax-helper.swift -O -o resources/ax-helper
          chmod +x resources/ax-helper

      - name: Setup Python 3.11 (für node-gyp / distutils)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install setuptools (distutils fix)
        run: pip install setuptools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NUT_TREE_TOKEN: ${{ secrets.NUT_TREE_TOKEN }}

      - name: Build Mac DMG (x64)
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac DMG (x64)
        uses: actions/upload-artifact@v4
        with:
          name: MIRA-Agent-Mac-x64
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          retention-days: 7

  # ─────────────────────────────────────────
  # RELEASE: Beide Artifacts → GitHub Release
  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac-arm64, build-mac-x64]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MIRA-Agent-Windows
          path: ./release

      - name: Download Mac artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: MIRA-Agent-Mac-arm64
          path: ./release

      - name: Download Mac artifact (x64)
        uses: actions/download-artifact@v4
        with:
          name: MIRA-Agent-Mac-x64
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-build.${{ github.run_number }}
          name: "MIRA Agent v${{ steps.pkg.outputs.version }}"
          body: |
            ## MIRA Agent – Automatischer Build

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Build:** #${{ github.run_number }}

            ### Downloads
            | Plattform | Datei |
            |-----------|-------|
            | 🍎 macOS (Intel + Apple Silicon) | `.dmg` |
            | 🪟 Windows (x64) | `.exe` Installer |
          files: ./release/*
          fail_on_unmatched_files: false
